name: evalutionapp
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.10.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  
  # Firebase Core
  firebase_core: ^3.4.0
  firebase_auth: ^5.1.4
  cloud_firestore: ^5.1.2
  firebase_messaging: ^15.1.3 

  # UI & Utilities
  http: ^1.1.0
  intl: ^0.19.0 
  carousel_slider: ^5.1.1
  url_launcher: ^6.2.1
  image_picker: ^1.0.4
  file_picker: ^8.3.7

  # PDF & Printing
  pdf: ^3.10.7
  printing: ^5.11.1
  syncfusion_flutter_pdfviewer: ^28.1.33

  # Excel, Storage & Sharing
  excel: ^4.0.3                
  path_provider: ^2.1.2        
  share_plus: ^10.1.0          
  open_file_plus: ^3.4.1       
  syncfusion_flutter_xlsio: ^28.1.33 

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  # Humne assets wala section abhi hata diya hai taake error na aaye.
  # Jab aap folder bana kar images rakh lengi, tab hum isay wapis add kar lenge.